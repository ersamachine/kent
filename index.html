<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#C51515"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>

<title>KENT TİCARET · Makine Cari</title>
<style>
:root{--red:#C51515;--reddk:#7d0d0d;--bg:#111111;--line:#383838;--muted:#8A8A8A;--muted2:#5A5A5A;--gold:#F5A623;--blue:#5B8DEF;--purple:#B98BFF;--borc:#FF6B5E;--in:#5B8DEF;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif;background:#0B0B0B;color:#CFCFCF;min-height:100vh;padding:24px 12px 60px;}
.bignum{font-weight:800;font-variant-numeric:tabular-nums;}.mono{font-variant-numeric:tabular-nums;}
.lead{max-width:760px;margin:0 auto;text-align:center;}
.lead h1{font-size:18px;font-weight:800;color:#fff;}
.lead p{font-size:12.5px;color:var(--muted);margin-top:7px;line-height:1.55;}.lead b{color:#cfcfcf;}

.stage{display:flex;justify-content:center;margin-top:20px;}
.phone{width:380px;max-width:100%;height:782px;background:#0e0e0e;border-radius:46px;padding:5px;box-shadow:0 40px 90px rgba(0,0,0,.5);}
.inner{width:100%;height:100%;background:var(--bg);border-radius:41px;overflow:hidden;display:flex;flex-direction:column;position:relative;}
.sbar{height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 22px 0;font-size:11px;font-weight:700;color:#fff;}
.island{width:58px;height:15px;background:#0e0e0e;border-radius:11px;}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;}.scr::-webkit-scrollbar{width:0;}
.pad{padding:6px 18px 30px;}
.tap{transition:transform .12s;cursor:pointer;}.tap:active{transform:scale(.97);}
.tap:focus-visible{outline:2px solid var(--red);outline-offset:2px;border-radius:12px;}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes sh{from{transform:translateY(100%)}to{transform:translateY(0)}}@keyframes fd{from{opacity:0}to{opacity:1}}
.stg>*{animation:su .38s cubic-bezier(.2,.7,.2,1) both;}
.stg>*:nth-child(2){animation-delay:.04s}.stg>*:nth-child(3){animation-delay:.08s}.stg>*:nth-child(4){animation-delay:.12s}.stg>*:nth-child(5){animation-delay:.16s}

.h1{font-weight:800;font-size:23px;color:#fff;}.sub{font-size:13px;color:var(--muted);margin-top:3px;}
.sec{font-weight:700;font-size:14px;color:#fff;margin:17px 0 9px;display:flex;justify-content:space-between;align-items:center;}
.sec .scount{font-size:11.5px;color:var(--muted);font-weight:600;}
.blk{background:#181818;border-radius:20px;}
.circ{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#202020;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.back{display:inline-flex;align-items:center;gap:3px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;}
i.ic svg{display:block;}

.brand{display:flex;align-items:center;gap:10px;}
.brand .bm{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#C51515,#7d0d0d);display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:16px;flex-shrink:0;box-shadow:0 6px 16px rgba(197,21,21,.3);}
.brand .bt{font-size:16px;font-weight:800;color:#fff;line-height:1.1;}.brand .bs{font-size:10.5px;color:var(--muted);margin-top:2px;}

.kgrid3{display:flex;gap:8px;margin-top:13px;}
.kbox{flex:1;background:#222;border-radius:11px;padding:9px;}
.kbox .kl{font-size:9.5px;color:#9b9b95;}.kbox .kv{font-weight:800;font-variant-numeric:tabular-nums;font-size:15px;margin-top:1px;}

.quick{display:flex;gap:10px;margin-top:13px;}
.qbtn{flex:1;border:none;border-radius:15px;padding:13px;font-size:14px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;}
.qsell{background:var(--red);color:#fff;box-shadow:0 8px 20px rgba(197,21,21,.28);}
.qcoll{background:#202020;color:#fff;border:1px solid #2e2e2e;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.modcard{background:#202020;border:1px solid #2a2a2a;border-radius:16px;padding:14px 13px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:transform .12s;}
.modcard:active{transform:scale(.97);}
.modcard .mi{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.modcard .ml{font-size:13px;font-weight:700;color:#fff;}.modcard .mv{font-size:10.5px;color:var(--muted);margin-top:1px;}
.wide{display:flex;align-items:center;gap:13px;background:#202020;border:1px solid #2a2a2a;border-radius:16px;padding:14px 15px;margin-top:11px;cursor:pointer;transition:transform .12s;}
.wide:active{transform:scale(.985);}
.wide .mi{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.lrow{display:flex;align-items:center;gap:12px;padding:13px 2px;border-top:1px solid var(--line);cursor:pointer;}
.lrow:first-child{border-top:none;}
.li{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lt{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ls{font-size:11.5px;color:var(--muted);margin-top:1px;}
.amt{font-weight:800;font-variant-numeric:tabular-nums;font-size:14.5px;text-align:right;white-space:nowrap;}
.bdg{display:inline-block;font-size:10px;font-weight:800;border-radius:7px;padding:2px 6px;margin-top:3px;}
.bdg-b{background:#2A1414;color:var(--borc);border:1px solid #4a2222;}
.bdg-c{background:#192639;color:var(--blue);border:1px solid #243a5a;}

.exhead{display:flex;gap:8px;margin:12px 0 6px;}
.exb{flex:1;background:#1a1a1a;border:1px solid #262626;border-radius:13px;padding:10px 11px;}
.exb .el{font-size:9.5px;color:#9b9b95;font-weight:700;}.exb .ev{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:2px;}
.chips{display:flex;gap:7px;overflow-x:auto;padding:4px 0 8px;}.chips::-webkit-scrollbar{height:0;}
.chip{flex-shrink:0;font-size:12px;font-weight:700;padding:7px 13px;border-radius:20px;background:#1c1c1c;border:1px solid #2a2a2a;color:var(--muted);cursor:pointer;white-space:nowrap;}
.chip.on{background:var(--red);border-color:var(--red);color:#fff;}
.exrow{display:flex;align-items:flex-start;gap:10px;padding:12px 2px;border-top:1px solid #242424;}.exrow:first-child{border-top:none;}
.exdate{font-size:11px;color:var(--muted2);font-variant-numeric:tabular-nums;width:46px;flex-shrink:0;line-height:1.3;font-weight:700;}
.extur{font-size:13.5px;font-weight:700;color:#fff;}.exack{font-size:11.5px;color:var(--muted);margin-top:1px;}
.exright{text-align:right;flex-shrink:0;}
.examt{font-weight:800;font-variant-numeric:tabular-nums;font-size:14px;}.exbak{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:2px;}
.exfoot{display:flex;justify-content:space-between;margin-top:14px;padding:14px;background:#181818;border-radius:16px;}
.exfoot .efc{text-align:center;flex:1;}.exfoot .efl{font-size:10px;color:#9b9b95;font-weight:700;}.exfoot .efv{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:3px;}

.k4{display:flex;gap:8px;margin-top:14px;}
.k4 .kbox{text-align:center;}.k4 .kv{font-size:20px;}
.ocard{display:flex;align-items:center;gap:13px;background:#1a1a1a;border:1px solid #262626;border-radius:16px;padding:14px 15px;margin-bottom:10px;cursor:pointer;transition:transform .12s;}
.ocard:active{transform:scale(.985);}
.oi{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.oqty{font-size:18px;font-weight:900;color:#fff;font-variant-numeric:tabular-nums;}.oqty small{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);}
.ot{font-size:14.5px;font-weight:700;color:#fff;}.os{font-size:11.5px;color:var(--muted);margin-top:2px;}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;border-radius:8px;padding:4px 9px;}
.eta{font-size:11px;color:var(--muted);margin-top:5px;font-variant-numeric:tabular-nums;}

.ovl{position:absolute;inset:0;background:rgba(15,15,15,.62);z-index:60;display:flex;align-items:flex-end;animation:fd .2s;}
.sheet{width:100%;background:#1c1c1c;border-radius:24px 24px 0 0;padding:18px 18px 26px;animation:sh .28s cubic-bezier(.2,.8,.2,1);max-height:92%;overflow-y:auto;}.sheet::-webkit-scrollbar{width:0;}
.shead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}.shead .stt{font-weight:800;font-size:18px;color:#fff;}
.lbl{display:block;font-size:12.5px;font-weight:700;color:#C8C8C4;margin:14px 0 6px;}
.field{width:100%;border:1px solid var(--line);border-radius:13px;padding:12px 13px;font-size:14.5px;color:#fff;background:#202020;outline:none;font-family:inherit;}
.field:focus{border-color:var(--red);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.toggle{display:flex;background:#161616;border:1px solid #2a2a2a;border-radius:14px;padding:4px;margin:6px 0 4px;}
.toggle button{flex:1;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:13.5px;font-weight:700;padding:10px;border-radius:11px;cursor:pointer;}
.toggle button.bon{background:var(--borc);color:#fff;}.toggle button.kon{background:var(--in);color:#fff;}
.steps{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
.step{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:13px;background:#161616;border:1px solid #262626;cursor:pointer;}
.step .sd{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step .sn{font-size:14px;font-weight:700;color:#fff;}
.btnp{width:100%;border:none;border-radius:15px;padding:15px;font-size:15px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;color:#fff;background:var(--red);box-shadow:0 8px 20px rgba(197,21,21,.28);margin-top:16px;}

.login{display:flex;flex-direction:column;justify-content:center;min-height:100%;padding:34px 28px;}
.login .lm{width:74px;height:74px;border-radius:20px;background:linear-gradient(135deg,#C51515,#7d0d0d);display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:30px;margin:0 auto 16px;box-shadow:0 14px 34px rgba(197,21,21,.34);}
.login h2{text-align:center;font-size:20px;font-weight:800;color:#fff;}
.login .lt{text-align:center;font-size:12px;color:var(--muted);letter-spacing:1.5px;font-weight:700;margin:5px 0 30px;}
.ersaby{text-align:center;font-size:11px;color:var(--muted2);margin-top:22px;}
.empty{text-align:center;color:var(--muted);padding:34px 16px;font-size:13px;line-height:1.6;}
@media (max-width:560px){body{padding:10px 0 40px;}.phone{width:100%;height:88vh;border-radius:0;}.inner{border-radius:0;}.lead{padding:0 14px;}}

.rememberbox{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin:2px 0 16px;cursor:pointer;}
.rememberbox input{width:16px;height:16px;accent-color:var(--red);}
.lerr{color:#FF6B5E;font-size:12.5px;text-align:center;margin-top:12px;min-height:16px;}
.banner{background:#2A1414;border:1px solid #4a2222;color:#FF9b8e;font-size:12.5px;border-radius:12px;padding:10px 13px;margin-top:12px;}
#toasthost{position:absolute;left:0;right:0;bottom:26px;display:flex;justify-content:center;z-index:90;pointer-events:none;}
.toast{background:#000;color:#fff;font-size:13px;font-weight:600;padding:11px 18px;border-radius:24px;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:fd .2s;max-width:80%;text-align:center;}
</style>
</head>
<body>
<div class="stage"><div class="phone"><div class="inner" id="app">
  <div class="sbar"><span id="clock">9:41</span><div class="island"></div><span style="font-size:10px;">▦ ▮ ▣</span></div>
  <div class="scr" id="scr"></div>

</div></div></div>
<script src="config.js"></script>
<script>
const P={users:"M16 19v-1a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v1M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM22 19v-1a4 4 0 0 0-3-3.8",user:"M5 20v-1a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4v1M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",receipt:"M5 3v18l2-1.5L9 21l2-1.5L13 21l2-1.5L17 21l2-1.5V3l-2 1.5L15 3l-2 1.5L11 3 9 4.5 7 3zM8 8h8M8 12h8",wallet:"M3 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2M3 9a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM16 12.5h3v3h-3a1.5 1.5 0 0 1 0-3z",doc:"M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9zM14 3v6h6M8 13h8M8 17h8",box:"M21 8 12 3 3 8m18 0-9 5m9-5v8l-9 5m0-13L3 8m9 5v8M3 8v8l9 5",clock:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM12 7v5l3 2",wrench:"M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z",truck:"M1 4h13v12H1zM14 8h4l3 3v5h-7zM6 19a2 2 0 1 0 0-.01M17 19a2 2 0 1 0 0-.01",plus:"M12 5v14M5 12h14",upload:"M12 3v13M6 9l6-6 6 6M5 21h14",x:"M18 6 6 18M6 6l12 12",check:"M20 6 9 17l-5-5",refresh:"M21 12a9 9 0 1 1-2.6-6.3M21 4v5h-5",logout:"M16 17l5-5-5-5M21 12H9M12 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h6",cl:"m15 6-6 6 6 6",chev:"m9 6 6 6-6 6"};
function ic(n,s,col){const d=P[n];if(!d)return"";return `<svg width="${s||16}" height="${s||16}" viewBox="0 0 24 24" fill="none" stroke="${col||'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d.split('M').filter(Boolean).map(p=>`<path d="M${p}"/>`).join('')}</svg>`;}
const $=id=>document.getElementById(id);
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const num=v=>typeof v==="number"?v:(parseFloat(String(v==null?"":v).replace(/\s/g,"").replace(",","."))||0);
const money=(n,c)=>{c=c||"$";n=n||0;const neg=n<0;return (neg?"-":"")+c+Math.round(Math.abs(n)).toLocaleString("tr-TR");};
const dS=s=>{if(!s)return"—";const d=new Date(s);if(isNaN(d))return String(s);return String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0");};
const dY=s=>{if(!s)return"—";const d=new Date(s);if(isNaN(d))return String(s);return d.getFullYear();};
const dT=s=>{if(!s)return"—";const d=new Date(s);if(isNaN(d))return String(s);return dS(s)+"."+d.getFullYear();};
const todayISO=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
const trsort=(a,b)=>String(a).localeCompare(String(b),"tr");

const ST={"Bekliyor":{c:"#F5A623",bg:"#2C2410",ic:"clock"},"Üretimde":{c:"#5B8DEF",bg:"#192639",ic:"wrench"},"Yolda":{c:"#B98BFF",bg:"#221A33",ic:"truck"},"Teslim":{c:"#CFCFCF",bg:"#262626",ic:"check"}};
const STORDER=["Bekliyor","Üretimde","Yolda","Teslim"];
const PST={"Bildirildi":{c:"#F5A623",bg:"#2C2410",t:"Onay bekliyor"},"Onaylandı":{c:"#5B8DEF",bg:"#192639",t:"ERSA onayladı"}};

let DATA={musteriler:[],hareketler:[],siparisler:[],ersaOdemeler:[],ersaAlimlar:[]};
const H=()=>DATA.hareketler;
const custList=()=>[...new Set(H().map(x=>x.Musteri).filter(Boolean))].sort(trsort);
const satislar=()=>H().filter(x=>x.Tur==="Satış");
const tahsilatlar=()=>H().filter(x=>x.Tur==="Tahsil");
const sumT=a=>a.reduce((s,x)=>s+num(x.Tutar),0);
const custBalance=m=>sumT(satislar().filter(x=>x.Musteri===m))-sumT(tahsilatlar().filter(x=>x.Musteri===m));
const totals=()=>{const b=sumT(satislar()),a=sumT(tahsilatlar());return{borc:b,alacak:a,bakiye:b-a};};
const acikMusteri=()=>custList().filter(m=>custBalance(m)>0.5).length;
function ekstre(f){const rows=H().map((x,i)=>({...x,_i:i})).filter(x=>!f||x.Musteri===f).sort((a,b)=>(String(a.Tarih)<String(b.Tarih)?-1:String(a.Tarih)>String(b.Tarih)?1:a._i-b._i));let bak=0;return rows.map(r=>{bak+=(r.Tur==="Satış"?num(r.Tutar):-num(r.Tutar));return{...r,bak};});}

const O=()=>DATA.siparisler;
const oAcik=()=>O().filter(o=>o.Durum!=="Teslim").reduce((s,o)=>s+num(o.Adet),0);
const oYol=()=>O().filter(o=>o.Durum==="Yolda").reduce((s,o)=>s+num(o.Adet),0);
const EO=()=>DATA.ersaOdemeler;
const ersaAlim=()=>DATA.ersaAlimlar.reduce((s,x)=>s+num(x.Tutar),0);
const ersaOnayli=()=>EO().filter(x=>x.Durum==="Onaylandı").reduce((s,x)=>s+num(x.Tutar),0);
const ersaBekleyen=()=>EO().filter(x=>x.Durum==="Bildirildi").reduce((s,x)=>s+num(x.Tutar),0);
const ersaBorc=()=>ersaAlim()-ersaOnayli();

const AUTH={email:"kent@kentticaret.com",pass:"Kent2026**"};
function getRemember(){try{return localStorage.getItem("kent_auth")==="1";}catch(e){return false;}}
let S={authed:getRemember(),view:"panel",exM:"",sheet:null,sel:null,loading:true,err:"",loginErr:"",tmp:null};

/* ---- ağ ---- */
async function load(){
 if(!window.API_URL||String(API_URL).indexOf("YAPISTIR")>=0){S.loading=false;S.err="config.js içine Apps Script adresini yazın.";render();return;}
 S.loading=true;render();
 try{
  const r=await fetch(API_URL,{method:"GET"});const j=await r.json();
  if(j.ok===false)throw new Error(j.error||"Hata");
  DATA.musteriler=j.musteriler||[];DATA.hareketler=j.hareketler||[];DATA.siparisler=j.siparisler||[];DATA.ersaOdemeler=j.ersaOdemeler||[];DATA.ersaAlimlar=j.ersaAlimlar||[];
  S.err="";
 }catch(e){S.err="Bağlantı kurulamadı / adres hatalı.";}
 S.loading=false;render();
}
async function post(payload){
 const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
 const j=await r.json(); if(j.ok===false)throw new Error(j.error||"Hata"); return j;
}
function toast(t){const h=$("toasthost");if(!h)return;h.innerHTML=`<div class="toast">${esc(t)}</div>`;setTimeout(()=>{h.innerHTML="";},1800);}

/* ===== LOGIN ===== */
function loginView(){return `<div class="login">
  <div class="lm">K</div><h2>KENT TİCARET</h2><div class="lt">MAKİNE CARİ & SİPARİŞ</div>
  <label class="lbl">E-posta</label><input id="lemail" class="field" type="email" value="${esc(AUTH.email)}" autocomplete="username">
  <label class="lbl">Şifre</label><input id="lpass" class="field" type="password" placeholder="••••••••" autocomplete="current-password">
  <label class="rememberbox"><input id="lrem" type="checkbox" ${getRemember()?'checked':''}> Beni hatırla</label>
  <button class="btnp" id="lbtn" onclick="doLogin()">${ic('check',16,'#fff')} Giriş Yap</button>

 if(!m){toast("Müşteri yazın");return;} if(!tut){toast("Tutar yazın");return;}
 busy("ftBtn","Kaydediliyor…");
 try{await post({action:"addHareket",tur,musteri:m,tarih:t,tutar:tut,fno:tur==="Satış"?ref:"",ack:tur==="Tahsil"?ref:""});closeSheet();toast("Kaydedildi");await load();}
 catch(e){toast("Hata: "+e.message);render();}
}

 try{await post({action:"addSiparis",adet:a,istenen:$("spIstenen").value,not:($("spNot").value||"").trim()});closeSheet();toast("Sipariş gönderildi");await load();S.view="siparisler";render();}
 catch(e){toast("Hata: "+e.message);render();}
}
async function saveSiparisDurum(id){
 const durum=S.tmp||(O().find(x=>String(x.ID)===String(id))||{}).Durum;const eta=$("spEta")?$("spEta").value:"";
 busy("sdBtn","Kaydediliyor…");
 try{await post({action:"siparisDurum",id,durum,eta});closeSheet();toast("Güncellendi");await load();S.view="siparisler";render();}
 catch(e){toast("Hata: "+e.message);render();}
}
async function saveOdeme(){
 const tut=num($("odTutar").value);if(!tut){toast("Tutar yazın");return;}
 busy("odBtn","Bildiriliyor…");
 try{await post({action:"addOdeme",tarih:$("odTarih").value,tutar:tut,yontem:$("odYontem").value,dekont:($("odDekont").value||"").trim()});closeSheet();toast("Ödeme bildirildi");await load();S.view="ersaodeme";render();}
 catch(e){toast("Hata: "+e.message);render();}
}
async function saveOdemeDurum(id){
 const durum=S.tmp||(EO().find(x=>String(x.ID)===String(id))||{}).Durum;
 busy("omBtn","Kaydediliyor…");
 try{await post({action:"odemeDurum",id,durum});closeSheet();toast("Güncellendi");await load();S.view="ersaodeme";render();}
 catch(e){toast("Hata: "+e.message);render();}
}

function openSheet(k){S.tmp=null;S.sheet=k;render();}
function closeSheet(){S.tmp=null;S.sheet=null;render();}
function go(v){S.view=v;S.sheet=null;render();}
function render(){
 if(!S.authed){$("scr").innerHTML=loginView();$("host").innerHTML="";const p=$("lpass");if(p)p.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});return;}
 if(S.loading){$("scr").innerHTML=`<div class="pad"><div class="empty" style="padding-top:130px;">${ic('refresh',30,'#5A5A5A')}<div style="margin-top:10px;">Yükleniyor…</div></div></div>`;$("host").innerHTML="";return;}
 const v=S.view;
 $("scr").innerHTML = v==="panel"?panelView():v==="musteriler"?musterilerView():v==="satislar"?hareketListesi("Satış"):v==="tahsilatlar"?hareketListesi("Tahsil"):v==="ekstre"?ekstreView():v==="siparisler"?siparisView():v==="ersaodeme"?ersaOdemeView():panelView();
 $("host").innerHTML = S.sheet?sheetForm():"";
 $("scr").scrollTop=0;
}
function clk(){const d=new Date();const el=$("clock");if(el)el.textContent=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
clk();setInterval(clk,30000);
if(S.authed){load();}else{S.loading=false;render();}

</script>
